<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Bismuth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .prompt {
            text-align: center;
            opacity: 1;
            transition: opacity 0.4s;
        }
        .prompt.hidden { opacity: 0; pointer-events: none; }
        .prompt input {
            background: transparent;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            padding: 10px 16px;
            width: 220px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .prompt input:focus { border-color: #888; }
        .prompt input:focus::placeholder { opacity: 0; }
        .prompt input.error {
            border-color: #c44;
            animation: shake 0.3s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>
    <div class="prompt" id="prompt">
        <input type="password" id="pw" placeholder="Password" autofocus>
    </div>
    <script>
    (function() {
        var input = document.getElementById('pw');
        var prompt = document.getElementById('prompt');

        async function deriveKey(password, salt) {
            var enc = new TextEncoder();
            var keyMaterial = await crypto.subtle.importKey(
                'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
            );
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: salt, iterations: 600000, hash: 'SHA-256' },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['decrypt']
            );
        }

        function b64(s) {
            var bin = atob(s), arr = new Uint8Array(bin.length);
            for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
            return arr;
        }

        async function decrypt(password, blob) {
            var salt = b64(blob.salt);
            var iv = b64(blob.iv);
            var tag = b64(blob.tag);
            var data = b64(blob.data);
            var combined = new Uint8Array(data.length + tag.length);
            combined.set(data);
            combined.set(tag, data.length);
            var key = await deriveKey(password, salt);
            var plain = await crypto.subtle.decrypt(
                { name: 'AES-GCM', iv: iv },
                key,
                combined
            );
            return new TextDecoder().decode(plain);
        }

        async function load(pw) {
            var resp = await fetch('app.enc');
            var blob = await resp.json();
            var html = await decrypt(pw, blob);
            localStorage.setItem('trip_pw', pw);
            prompt.classList.add('hidden');
            setTimeout(function() {
                document.open();
                document.write(html);
                document.close();
            }, 400);
        }

        async function attempt() {
            var pw = input.value;
            if (!pw) return;
            try {
                await load(pw);
            } catch(e) {
                input.classList.add('error');
                input.value = '';
                setTimeout(function() { input.classList.remove('error'); }, 400);
            }
        }

        var saved = localStorage.getItem('trip_pw');
        if (saved) {
            load(saved).catch(function() {
                localStorage.removeItem('trip_pw');
                prompt.style.display = '';
            });
        }

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') attempt();
        });
    })();
    </script>
</body>
</html>
